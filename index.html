<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHIRASIN MARKET - รับถ่ายวีดีโอ</title>
    <style>
        * { box-sizing: border-box; font-family: 'Tahoma', 'Sarabun', sans-serif; }
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); margin: 0; padding: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; color: white; text-align: center; }
        .card { background-color: rgba(30, 41, 59, 0.7); padding: 40px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 25px rgba(0,0,0,0.4); max-width: 500px; width: 90%; }
        h1 { font-size: 32px; font-weight: 900; margin-bottom: 10px; color: white; }
        .orange-text { color: #ff6b35; }
        p { color: #94a3b8; font-size: 16px; margin-bottom: 30px; line-height: 1.5; }
        .btn { display: inline-block; background-color: #ef6c00; color: white !important; text-decoration: none; padding: 14px 28px; font-size: 18px; font-weight: bold; border-radius: 8px; box-shadow: 0 4px 14px rgba(239,108,0,0.4); transition: all 0.2s; }
        .btn:hover { background-color: #f57c00; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(239,108,0,0.6); }
    </style>
</head>
<body>
    <div class="card">
        <h1>CHIRASIN <span class="orange-text">MARKET</span></h1>
        <p>ยินดีต้อนรับสู่ศูนย์รวมบริการของเรา<br>คลิกที่ปุ่มด้านล่างเพื่อเข้าสู่เว็บไซต์รับถ่ายวีดีโอโปรดักชั่น</p>
        <!-- ลิงก์เชื่อมไป Google Sites ของคุณน้อง -->
        <a href="https://google.com" class="btn">🎥 เข้าสู่เว็บรับถ่ายวีดีโอ</a>
    </div>
</body>
</html>
